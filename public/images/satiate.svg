<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <!-- Gradient for the app icon background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#27272a" stroke-width="8" />

  <!-- Satiate Icon Group -->
  <g transform="translate(112, 112) scale(12)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Fork -->
    <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2" stroke="#ffffff" stroke-width="2" fill="none" />
    <path d="M7 2v4" stroke="#ffffff" stroke-width="2" fill="none" />
    <path d="M12 11v11" stroke="#ffffff" stroke-width="2" fill="none" />
    <!-- Knife -->
    <path d="M21 15V2a5 5 0 0 0-5 5v8c0 1.1.9 2 2 2h3Z" stroke="#ffffff" stroke-width="2" fill="none" />
    <path d="M18 17v5" stroke="#ffffff" stroke-width="2" fill="none" />
  </g>
</svg>
