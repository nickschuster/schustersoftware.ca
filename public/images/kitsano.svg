<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <!-- Gradient for the app icon background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#27272a" stroke-width="8" />

  <!-- Kitsano Icon Group (Layers for Multi-tenancy/SaaS stacks) -->
  <g transform="translate(112, 112) scale(12)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Top Layer -->
    <polygon points="12 2 2 7 12 12 22 7 12 2" stroke="#ffffff" stroke-width="1.8" fill="none" />
    <!-- Middle Layer -->
    <path d="M2 12 12 17 22 12" stroke="#ffffff" stroke-width="1.8" fill="none" />
    <!-- Bottom Layer -->
    <path d="M2 17 12 22 22 17" stroke="#ffffff" stroke-width="1.8" fill="none" />
  </g>
</svg>
