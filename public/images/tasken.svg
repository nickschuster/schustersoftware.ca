<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <!-- Gradient for the app icon background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#27272a" stroke-width="8" />

  <!-- Check Icon Group -->
  <g transform="translate(112, 112) scale(12)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Circle with path missing to merge with check -->
    <path d="M21.801 10A10 10 0 1 1 17 3.335" stroke="#ffffff" stroke-width="2" fill="none" />
    <!-- Checkmark -->
    <path d="m9 11 3 3L22 4" stroke="#ffffff" stroke-width="2" fill="none" />
  </g>
</svg>
