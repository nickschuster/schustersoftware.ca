<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <!-- Gradient for the app icon background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#27272a" stroke-width="8" />

  <!-- Whiteboard Icon Group -->
  <g transform="translate(112, 112) scale(12)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stand/Legs -->
    <path d="M12 2v20" stroke="#ffffff" stroke-width="2" fill="none" />
    <path d="m5 22 7-20 7 20" stroke="#ffffff" stroke-width="2" fill="none" />
    <!-- Whiteboard Board -->
    <rect x="4" y="5" width="16" height="11" rx="1.5" fill="#09090b" stroke="#ffffff" stroke-width="2" />
    <!-- Drawing line on the board -->
    <path d="m8 10 3 2 5-4" stroke="#ffffff" stroke-width="1.5" fill="none" />
  </g>
</svg>
