<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <!-- Gradient for the app icon background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" stroke="#27272a" stroke-width="8" />

  <!-- Nine Men's Morris Game Board Group -->
  <g transform="translate(112, 112) scale(12)" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer Square -->
    <rect x="3" y="3" width="18" height="18" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <!-- Middle Square -->
    <rect x="6" y="6" width="12" height="12" stroke="#ffffff" stroke-width="1.5" fill="none" />
    <!-- Inner Square -->
    <rect x="9" y="9" width="6" height="6" stroke="#ffffff" stroke-width="1.5" fill="none" />
    
    <!-- Midpoint Connectors -->
    <line x1="12" y1="3" x2="12" y2="9" stroke="#ffffff" stroke-width="1.5" />
    <line x1="12" y1="15" x2="12" y2="21" stroke="#ffffff" stroke-width="1.5" />
    <line x1="3" y1="12" x2="9" y2="12" stroke="#ffffff" stroke-width="1.5" />
    <line x1="15" y1="12" x2="21" y2="12" stroke="#ffffff" stroke-width="1.5" />
  </g>
</svg>
